<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href= "../static/css/index.css">
</head>
<body>
    <h1 class = "main-title">Results</h1>
    <pre class = "regular-text">{{ mode_str }}</pre>
    <pre class = "regular-text">{{ line_str }}</pre>
    <pre class = "regular-text">{{ city_pair_str }}</pre>
    <li><a class = "nav-option" href = "/make-a-line">make another line</a></li>

    <div class = "map-container">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.21.0/dist/maplibre-gl.css"/>
        <script src="https://unpkg.com/maplibre-gl@5.21.0/dist/maplibre-gl.js"></script>
            <div id="map"></div>

            <style>
            #map {
                width: 100%;
                height: 500px;
            }
            </style>

            <script>
            const cities = JSON.parse('{{ citiesCords | tojson | safe}}');

            console.log(cities);

            const map = new maplibregl.Map({
                container: 'map',
                style: 'https://demotiles.maplibre.org/style.json',
                center: [-95, 40],
                zoom: 3
            }); 

              cities.forEach(city => {
                new maplibregl.Marker()
                .setLngLat([city.lng, city.lat])
                .addTo(map);
                
            });


            let coords = [];
            cities.forEach(city => {
                coords.push([city.lng, city.lat]);
            })


            map.on('load', () => {
                map.addSource('route', {
                    'type': 'geojson',
                    'data': {
                        'type': 'Feature',
                        'properties': {},
                        'geometry': {
                            'type': 'LineString',
                            'coordinates': 
                                coords
                                
                        }
                    }
                });
                map.addLayer({
                    'id': 'route',
                    'type': 'line',
                    'source': 'route',
                    'layout': {
                        'line-join': 'round',
                        'line-cap': 'round'
                    },
                    'paint': {
                        'line-color': '#888',
                        'line-width': 8
                    }
                });
            });

            
        </script>
    </div>
</body>
</html>
